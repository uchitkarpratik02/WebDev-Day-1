<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section>
        <h2>Admission Form</h2>
        <form action="action.php">
        <div>
            <label for="sm">Full Name:</label>
            <input type="text" id="sm" placeholder="Enter Your Name">
        </div>
        <br>
        <div>
            <label for="ed">Email:</label>
            <input type="email" id="ed" placeholder="Enter Your Email">
        </div>
        <br>
        <div>
            <label for="mn">Mobile Number:</label>
            <input type="number" id="mn" placeholder="Enter Your Mobile No.">
        </div>
        <br>
        <div>
            <label>Gender: </label>
            <input type="radio" name="sx" id="male" value="male">
            <label for="male">male</label>
            <input type="radio" name="sx" id="female" value="female">
            <label for="female">female</label>
        </div>
        <br>
        <div>
            <label for="Course"> Course:</label>
            <select name="branch" id="branch">
                <option>Select Your Course</option>  
                <option value="fd">PHD</option>      
                <option value="bd">M.tech</option>
                <option value="fl">B.tech</option>
                <option value="it">B.e</option>
            </select>
        </div>
        <br>
        <section>
        <label for="addressmaimi">Address:</label>
        <textarea id="addressmaimi">Fill Your Permenet Address</textarea>
    </section>
        <br>
        <div>
            <button type="Submit">Submit</button>
        </div>
        </form>
    </section>
    <hr>
    <section>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" text-center>
        <h1>Log-in Form</h1>
        <form action="action.php" class="mb-3">
            <div class="row">
                <div class="col-md-6">
                    <input type="email" class="form-control" placeholder="Enter-Email" aria-label="email">
                </div>
                <div class="col-md-6">
                    <input type="password" class="form-control" placeholder="Enter Password" aria-label="password">
                </div>
            </div>

            <label for="City">Select Your City</label>
            <select class="form-select mb-3" id="City">
                <option selected>Select Your City</option>
                <option value="nag">Nagpur</option>
                <option value="pun">Pune</option>
                <option value="mum">Mmbai</option>
                <option value="del">Delhi</option>
            </select>

            <div class="mb-3 form-check">
                <input type="checkbox" id="agree" class="form-check-input">
                <label for="agree" class="form-check-label"> I-Agree</label>
            </div>

            <button class="btn btn-primary">Login</button>
        </form>
    </div>

    <script src="https://jsdelivr.net" integr ity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9Gk dslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

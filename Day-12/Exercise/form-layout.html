<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" text-center>
        <h1>Log-in Form</h1>
        <form action="action.php" class="mb-3">
            <div class="row">
                <div class="col-md-6">
                    <input type="text" class="form-control" placeholder="Enter-Name" aria-label="name">
                </div>
                <div class="col-md-6">
                    <input type="email" class="form-control" placeholder="Enter-Email" aria-label="email">
                </div>
                <br>
                <div class="col-md-6">
                    <input type="password" class="form-control" placeholder="Enter Password" aria-label="password">
                </div>
                <div class="col-md-6">
                    <select class="form-select mb-3" id="City">
                        <option selected>Select Your City</option>
                        <option value="nag">Nagpur</option>
                        <option value="pun">Pune</option>
                        <option value="mum">Mmbai</option>
                        <option value="del">Delhi</option>
                    </select>
                </div>
            </div>
                


            

            

            <button class="btn btn-primary">Submit</button>
        </form>
    </div>

    
</body>
</html>

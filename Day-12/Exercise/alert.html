<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Bootstrap-Alert</title>
</head>
<body>
    <div class="alert alert-success"> 
        Successful!
        <div>your message has been sent Successfully. </div>
    </div>
    <div class="alert alert-danger"> 
        Error!
        <div>a problemed has been occureed while submmiting your data</div>
    </div>
    <div class="alert alert-warning"> 
        Warning!
        <div>there was a problem with your network connection. </div>
    </div>
    <div class="alert alert-primary"> 
        Info!
        <div>please read comments carefully </div>
    </div>


</body>
</html>

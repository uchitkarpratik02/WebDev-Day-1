<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Checkbox & Radio</title>
</head>
<body>
    <section>
        <div class="container mt-4">
            <div class="form-check">
                <input class="form-check-input" id="mango" type="checkbox" value="man">
                <label class="form-check-label" for="mango">Mango</label>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" id="banana" type="checkbox" value="ban">
                <label class="form-check-label" for="banana">Banana</label>
            </div>
        </div>
    </section>
    <hr>
    <section>
        <div class="container mt-4">
            <div class="form-check">
                <!-- Changed name to "color" and added value -->
                <input class="form-check-input" type="radio" name="color" id="red" value="red">
                <label class="form-check-label" for="red">Red</label>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="radio" name="color" id="green" value="green">
                <label class="form-check-label" for="green">Green</label>
            </div>
        </div>
    </section>
    
        
        
        
    
    
</body>
</html>

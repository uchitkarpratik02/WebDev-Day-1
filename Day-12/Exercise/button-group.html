<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <title>Button-Group</title>
</head>
<body>
    <div class="btn-group" role="group">
        <button class="btn btn-outline-primary">HTML</button>
        <button class="btn btn-outline-danger">CSS</button>
        <button class="btn btn-outline-success">JavaScript</button>
    </div>   
    <hr>
    <div class="btn-group-vertical" role="group">
        <button class="btn btn-primary">HTML</button>
        <button class="btn btn-danger">CSS</button>
        <button class="btn btn-success">JavaScript</button>
    </div>   
</body>
</html>
